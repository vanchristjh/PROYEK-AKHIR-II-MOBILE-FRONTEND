buildscript {
    ext.kotlin_version = '1.7.10'
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:7.3.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
    
    // Add namespace configuration for plugins
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            if (!project.android.hasProperty('namespace') && project.plugins.hasPlugin('com.android.library')) {
                project.android {
                    namespace project.pluginNamespace ?: "dev.flutter.plugins.${project.name.replace('-', '_')}"
                }
            }
        }
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
